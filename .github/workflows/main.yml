name: Build AndUEDumper

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        android-abi: [arm64-v8a, armeabi-v7a, x86, x86_64]
        build-type: [Release, Debug]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r26

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2
      with:
        cmake-version: 3.27

    - name: Setup Ninja
      uses: seanmiddleditch/gha-setup-ninja@master

    - name: Create build directory
      run: mkdir -p build

    - name: Configure CMake
      run: |
        cd AndUEDumper
        cmake -S . -B ../build \
          -G "Ninja" \
          -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=${{ matrix.android-abi }} \
          -DANDROID_PLATFORM=android-21 \
          -DANDROID_STL=c++_static

    - name: Build
      run: |
        cmake --build build -j$(nproc)

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: UEDump3r-${{ matrix.android-abi }}-${{ matrix.build-type }}
        path: build/UEDump3r
        if-no-files-found: ignore

  build-shared:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        android-abi: [arm64-v8a, armeabi-v7a, x86, x86_64]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r26

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2
      with:
        cmake-version: 3.27

    - name: Setup Ninja
      uses: seanmiddleditch/gha-setup-ninja@master

    - name: Create build directory
      run: mkdir -p build-shared

    - name: Configure CMake for shared library
      run: |
        cd AndUEDumper
        cmake -S . -B ../build-shared \
          -G "Ninja" \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_SHARED=ON \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=${{ matrix.android-abi }} \
          -DANDROID_PLATFORM=android-21 \
          -DANDROID_STL=c++_static

    - name: Build shared library
      run: |
        cmake --build build-shared -j$(nproc)

    - name: Upload shared library artifacts
      uses: actions/upload-artifact@v4
      with:
        name: libUEDump3r-${{ matrix.android-abi }}
        path: build-shared/libUEDump3r.so
        if-no-files-found: ignore
